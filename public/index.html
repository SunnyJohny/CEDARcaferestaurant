<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#d12d2e" />

    <!-- ✅ Favicon and App Icons (logo not yet renamed) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/images/cedarLogo.jpeg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/cedarLogo.jpeg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/cedarLogo.jpeg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/images/cedarLogo.jpeg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/images/cedarLogo.jpeg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/cedarLogo.jpeg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ✅ SEO Meta Tags -->
    <meta
      name="title"
      content="CEDAR cafe & restaurant – Delicious Meals & Cozy Dining in Nigeria"
    />
    <meta
      name="description"
      content="CEDAR cafe & restaurant serves flavorful local and continental dishes in a warm and relaxing atmosphere. Dine in, take out, or order for delivery today and enjoy real taste!"
    />
    <meta
      name="keywords"
      content="Momma Choji’s, CHOP N CHILL, Restaurant, Food, Nigeria, Takeaway, Delivery, Eatery, Local Dishes, Continental Meals, Snacks, Drinks"
    />
    <meta name="author" content="CEDAR cafe & restaurant" />

    <!-- ✅ Open Graph Meta (Social Sharing) -->
    <meta property="og:title" content="CEDAR cafe & restaurant" />
    <meta
      property="og:description"
      content="Relax, eat and enjoy delicious meals at CEDAR cafe & restaurant – where good food meets great vibes."
    />
    <meta
      property="og:image"
      content="https://www.b10eatery.com.ng/images/cedarLogo.jpeg"
    />
    <meta property="og:url" content="https://www.mommachojis.com.ng" />
    <meta property="og:type" content="website" />

    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CEDAR cafe & restaurant" />
    <meta
      name="twitter:description"
      content="Taste comfort and flavor at CEDAR cafe & restaurant. Dine-in, takeaway and delivery available."
    />
    <meta
      name="twitter:image"
      content="https://www.b10eatery.com.ng/images/cedarLogo.jpeg"
    />

    <title>CEDAR cafe & restaurant</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
